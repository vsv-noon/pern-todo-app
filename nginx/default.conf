server {
        listen 80;

        location / {
            # Proxy API requests to the Node.js backend service name
            proxy_pass http://client:3000; # Use the service name defined in docker-compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            # Proxy API requests to the Node.js backend service name
            proxy_pass http://server:5000; # Use the service name defined in docker-compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }    

